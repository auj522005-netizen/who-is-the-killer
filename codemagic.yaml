# ────────────────────────────────────────────────────────────────
# Codemagic CI/CD Configuration — Who is the Killer?
# Android-only release builds (APK).
# ────────────────────────────────────────────────────────────────

workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Generate Android project files
        script: |
          flutter create --platforms=android .

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
