# ────────────────────────────────────────────────────────────────
# Codemagic CI/CD Configuration — Who is the Killer?
# Android-only release builds (AAB/APK).
# ────────────────────────────────────────────────────────────────

workflows:
  # ── Android Release Workflow ──────────────────────────────────
  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      vars:
        GOOGLE_PLAY_TRACK: production
      groups:
        - google_play_credentials
        - signing_credentials

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Set up local properties
        script: echo "flutter.minSdkVersion=21" >> "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install code generation dependencies
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Run static analysis (zero-warning policy)
        script: |
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run unit tests
        script: |
          flutter test --coverage

      - name: Build AAB (Android App Bundle)
        script: |
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --obfuscate \
            --split-debug-info=build/debug_info

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/*.apk
      - build/debug_info/**
      - coverage/lcov.info

    publishing:
      google_play:
        credentials: ${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON}
        track: ${GOOGLE_PLAY_TRACK}
        submit_as_draft: true
